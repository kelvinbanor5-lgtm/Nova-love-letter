<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nova ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* Love card */
.card{
    background:white;
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    z-index:2;
}

h1{
    color:#ff1744;
    margin-bottom:15px;
}

h2{
    color:#ff1744;
}

p{
    color:#444;
    font-size:18px;
    line-height:1.7;
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#ff1744;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

/* Falling hearts and roses */
.fall{
    position:absolute;
    top:-50px;
    animation:fall linear infinite;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-10vh) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* Hidden letter */
#letter{
    display:none;
    margin-top:25px;
}

</style>

</head>

<body>

<div class="card">

<h1>❤️ Nova ❤️</h1>

<p>
I made something special for you.
Not just a message, but a little piece of my heart.
</p>

<button onclick="openLetter()">
Open My Heart ❤️
</button>


<div id="letter">

<h2>Dear Nova,</h2>

<p id="typing"></p>

</div>

</div>


<script>

function createFalling(){

let item=document.createElement("div");

let symbols=["❤️","🌹","💕","🌸"];

item.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

item.className="fall";

item.style.left=Math.random()*100+"vw";

item.style.fontSize=(20+Math.random()*25)+"px";

item.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(item);


setTimeout(()=>{
item.remove();
},8000);

}


setInterval(createFalling,300);



let message=`
Nova,

You are someone very special to me.

Thank you for the smiles, the conversations,
and the memories we share.

I created this because I wanted you to know
that you are appreciated and cared for.

I may not be perfect, but I will always try
to be someone who supports and respects you.

Keep being the amazing person you are.

I Love You ❤️

— Kelvin
`;

let i=0;


function openLetter(){

document.querySelector("button").style.display="none";

document.getElementById("letter").style.display="block";

typeText();

}


function typeText(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeText,50);

}

}

</script>

</body>
</html>
